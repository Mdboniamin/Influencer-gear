<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Gear</title>
    <link rel="stylesheet" href="styles/influencer.css">
    <script src="https://kit.fontawesome.com/73eda02488.js" crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <nav class="nav">
            <div class="menu">
                <p><i class="fa-solid fa-bars"></i></p>
            </div>
            <div>
                <h3 class="title">Influencer products</h3>
            </div>
            <div class="nav-link">
                <p>Home</p>
                <p>Products</p>
                <p>Sign up</p>
                <p>Log in</p>
                <p><i class="fa-solid fa-magnifying-glass"></i></p>
            </div>
            <div class="cart">
                <p><i class="fa-solid fa-cart-arrow-down"></i></p>
            </div>
        </nav>
    </header>

    <main>
        <section class="landing">
            <div class="content">
                <h1 class="title">Start your Journey as
                    Influencer</h1>
                <p class="description">Find all the professional gear you need in one place — from cameras and microphones to lighting and accessories — and create content that stands out from the crowd.</p>
                <button class="btn-primary">Preebook now<i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div class="img">
                <img class="circle" src="images/Circle design.svg" alt="">
                <img class="camera" src="images/main-camera.png" alt="">
            </div>
        </section>
        <section class="sponsor">
            <img src="logos/Alibaba.svg" alt="">
            <img src="logos/Amazon.svg" alt="">
            <img src="logos/Daraz.pk Logo.svg" alt="">
            <img src="logos/Ebay.svg" alt="">
            <img src="logos/Rakuten.svg" alt="">
            <img src="logos/Walmart.svg" alt="">
            <img src="logos/Target.svg" alt="">
        </section>
    </main>
    <footer>

    </footer>
</body>

</html>
